# =============================================================================
# ASD Multimodal Detection Framework - Master Configuration
# =============================================================================
# Design principle: every tunable parameter lives here.
# Code never hard-codes values. This ensures full reproducibility.

project:
  name: "ASD_Multimodal_Detection"
  version: "1.0.0"
  description: "Multimodal ASD detection using structural MRI and genetic data"
  random_seed: 42
  device: "cuda"          # "cuda" | "cpu" | "mps"
  mixed_precision: true
  num_workers: 4
  pin_memory: true

# --- Paths ---
paths:
  root: "e:/ASD_forever"
  data_raw_mri: "datasets/raw/mri"
  data_raw_genetics: "datasets/raw/genetics"
  data_processed_mri: "abide_processed/mri"
  data_processed_genetics: "abide_processed/gen"
  splits: "datasets/splits"
  saved_models: "saved_models"
  results: "results"
  figures: "results/figures"
  tables: "results/tables"
  reports: "results/reports"
  paper_figures: "paper/figures"
  logs: "results/logs"

# --- Dataset Configuration ---
dataset:
  name: "ABIDE_I"            # ABIDE_I | ABIDE_II | CUSTOM
  mri_modality: "func_preproc"  # func_preproc | anat_T1w
  genetic_type: "gene_expression"  # gene_expression | snp | rna_seq
  abide_pipeline: "cpac"     # cpac | dpabi | css | niak (MRI pipeline used)
  abide_strategy: "filt_global"
  target_column: "DX_GROUP"  # 1=ASD, 2=TC (converted to 0/1 in preprocessing)

  # Class mapping (ABIDE uses 1=ASD, 2=TC)
  class_map:
    ASD: 1
    TC: 0

  # Train/Val/Test splits
  test_size: 0.15
  val_size: 0.15
  stratify: true

# --- MRI Preprocessing ---
mri_preprocessing:
  target_shape:  [19900]    # flat FC vector
  target_voxel_size: [2.0, 2.0, 2.0]  # mm isotropic
  intensity_norm: "z_score"     # z_score | min_max | percentile
  apply_brain_mask: true
  apply_bias_correction: true   # N4ITK bias field correction
  smooth_fwhm: 6.0              # FWHM in mm for spatial smoothing (0 = skip)
  quality_threshold: 0.8        # Minimum quality score to include scan

  augmentation:
    enabled: true
    flip_prob: 0.5
    rotation_degrees: 10
    scale_range: [0.9, 1.1]
    noise_std: 0.01
    elastic_deform: false       # Expensive; enable for final training

# --- Genetics Preprocessing ---
genetics_preprocessing:
  missing_threshold: 0.2       # Drop features with >20% missing
  variance_threshold: 0.01     # Drop near-zero variance features
  normalization: "robust"      # robust | standard | min_max
  selection_method: "combined" # combined | variance | pca | mutual_info
  n_top_features: 1000         # After initial filtering
  batch_correction: "combat"   # combat | none (for multi-site data)

  dimensionality_reduction:
    method: "pca"              # pca | autoencoder | umap
    n_components: 256
    explained_variance_threshold: 0.95

# --- MRI Feature Extraction ---
mri_model:
  backbone: "medicalnet_resnet50"  # medicalnet_resnet50 | swin3d | densenet3d | convnext3d | vit3d
  pretrained: true
  freeze_backbone: false
  feature_dim: 512
  dropout: 0.3

  # Swin Transformer 3D config (if backbone = swin3d)
  swin3d:
    embed_dim: 96
    depths: [2, 2, 6, 2]
    num_heads: [3, 6, 12, 24]
    window_size: [7, 7, 7]
    mlp_ratio: 4.0
    drop_path_rate: 0.2

  # DenseNet 3D config
  densenet3d:
    growth_rate: 32
    block_config: [6, 12, 24, 16]
    num_init_features: 64
    bn_size: 4
    drop_rate: 0.2

# --- Genetics Feature Extraction ---
genetics_model:
  architecture: "transformer"   # transformer | mlp | tabnet | graph_transformer
  input_dim: 6                # was 256
  hidden_dims: [512, 256, 128]
  feature_dim: 256
  dropout: 0.3
  num_heads: 8                  # For transformer
  num_layers: 4                 # For transformer

# --- Fusion Model ---
fusion:
  method: "cross_attention"     # early | late | intermediate | cross_attention | gated | dynamic
  mri_feature_dim: 512
  genetics_feature_dim: 256
  fusion_dim: 512
  num_heads: 8
  dropout: 0.3
  num_classes: 2

  # Gated fusion config
  gated:
    gate_activation: "sigmoid"

  # Cross-attention config
  cross_attention:
    num_layers: 2
    ffn_dim: 1024

# --- Training ---
training:
  batch_size: 8                 # Small due to 3D MRI memory requirements
  gradient_accumulation_steps: 4  # Effective batch = 32
  max_epochs: 100
  learning_rate: 1.0e-4
  weight_decay: 1.0e-5
  optimizer: "adamw"            # adamw | adam | sgd
  scheduler: "cosine_warmup"    # cosine_warmup | step | plateau | onecycle

  warmup_epochs: 5
  min_lr: 1.0e-7

  early_stopping:
    enabled: true
    patience: 15
    monitor: "val_auc"
    mode: "max"
    min_delta: 1.0e-4

  # Cross-validation
  cross_validation:
    enabled: true
    n_folds: 5
    stratified: true
    group_by_site: true         # Prevent site-leakage across folds (critical for ABIDE)

  # Loss function
  loss:
    type: "focal"               # focal | cross_entropy | balanced
    focal_alpha: 0.25
    focal_gamma: 2.0
    label_smoothing: 0.1

  # Gradient
  gradient_clip_norm: 1.0
  ema_decay: 0.999              # Exponential moving average

  # Checkpointing
  save_top_k: 3
  checkpoint_metric: "val_auc"

# --- Evaluation ---
evaluation:
  metrics:
    - accuracy
    - precision
    - recall
    - specificity
    - f1
    - roc_auc
    - pr_auc
    - balanced_accuracy
    - mcc
  bootstrap_iterations: 1000   # For confidence intervals
  significance_level: 0.05
  plot_roc: true
  plot_pr: true
  plot_confusion: true
  plot_calibration: true

# --- Explainability ---
explainability:
  methods:
    - gradcam
    - gradcam_plus_plus
    - integrated_gradients
    - shap
    - attention_rollout
  gradcam_layer: "auto"         # auto-detect last conv layer
  shap_samples: 100
  ig_steps: 50
  save_heatmaps: true
  visualize_top_k_genes: 30    # Top genes to visualize

# --- Hyperparameter Tuning ---
hparam_tuning:
  enabled: false
  method: "optuna"              # optuna | grid | random
  n_trials: 50
  timeout_hours: 12
  metric: "val_auc"
  direction: "maximize"
  pruner: "hyperband"

# --- Experiment Tracking ---
tracking:
  mlflow:
    enabled: true
    experiment_name: "ASD_Multimodal"
    tracking_uri: "mlruns"
  wandb:
    enabled: false              # Set true with WANDB_API_KEY env var
    project: "asd-multimodal"
    entity: null                # Set your wandb entity

# --- Logging ---
logging:
  level: "INFO"
  format: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"
  log_to_file: true
  log_dir: "results/logs"
